<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peter Hoff Design AB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f4f0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .logo {
      width: 120px;
      height: auto;
    }

    .info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .info p {
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #333;
      line-height: 1.6;
    }

    .info a {
      color: #5ab8b2;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #5ab8b2;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="PHD LOGO.jpg" alt="Peter Hoff Design AB" />
    <div class="divider"></div>
    <div class="info">
      <p>peter hoff design ab &nbsp;|&nbsp; peter hoff</p>
      <p>p o hallmans gata 5 &nbsp;|&nbsp; 112 69 stockholm</p>
      <p><a href="tel:+46708695608">+46 70 869 56 08</a></p>
      <p><a href="mailto:peter@peterhoffdesign.com">peter@peterhoffdesign.com</a></p>
      <p><a href="https://peterhoffdesign.com" target="_blank" rel="noopener">peterhoffdesign.com</a></p>
    </div>
  </div>
</body>
</html>
