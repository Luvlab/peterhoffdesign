<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peter Hoff Design AB</title>
  <script>if (!localStorage.getItem('phd_auth')) location.replace('/landing.html')</script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <a href="/" class="logo-link"><img src="phd-logo.png" alt="Peter Hoff Design AB" class="logo" /></a>
    <nav class="site-nav">
      <a href="/">Portfolio</a>
      <a href="#contact" id="contactLink">Kontakt</a>
    </nav>
  </header>

  <!-- filter-bar: scrollable nav + sticky logo (shown on scroll) + ratio picker -->
  <div class="filter-bar" id="filterBar">
    <nav class="filter-nav" id="filterNav">
      <button class="filter-btn active" data-filter="featured">Featured</button>
      <button class="filter-btn" data-filter="all">All</button>
    </nav>

    <!-- logo appears here when header scrolls out of view -->
    <a href="/" class="filter-bar-logo" id="filterBarLogo" title="Peter Hoff Design AB">
      <img src="phd-logo.png" alt="Peter Hoff Design AB" />
    </a>

    <div class="ratio-picker" id="ratioPicker">
      <button class="ratio-btn active" data-ratio="1/1" title="1:1">
        <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="14" rx="1"/></svg>
      </button>
      <button class="ratio-btn" data-ratio="4/3" title="4:3">
        <svg width="18" height="14" viewBox="0 0 18 14"><rect x="1" y="1" width="16" height="12" rx="1"/></svg>
      </button>
      <button class="ratio-btn" data-ratio="16/9" title="16:9">
        <svg width="20" height="12" viewBox="0 0 20 12"><rect x="1" y="1" width="18" height="10" rx="1"/></svg>
      </button>
      <button class="ratio-btn" data-ratio="3/4" title="3:4">
        <svg width="14" height="18" viewBox="0 0 14 18"><rect x="1" y="1" width="12" height="16" rx="1"/></svg>
      </button>
      <button class="ratio-btn" data-ratio="9/16" title="9:16">
        <svg width="12" height="20" viewBox="0 0 12 20"><rect x="1" y="1" width="10" height="18" rx="1"/></svg>
      </button>
    </div>
  </div>

  <main class="projects-grid" id="projectsGrid">
    <p class="loading">Loading&hellip;</p>
  </main>

  <!-- Project detail overlay -->
  <div class="detail-overlay" id="detailOverlay" hidden>
    <div class="detail-header">
      <button class="detail-back" id="detailBack">&#8592; Back</button>
      <div class="detail-meta">
        <h2 class="detail-name" id="detailName"></h2>
        <span class="detail-cat" id="detailCat"></span>
      </div>
      <span class="detail-brand">Peter Hoff Design</span>
    </div>
    <div class="detail-gallery" id="detailGallery"></div>
    <div class="detail-map" id="detailMap" hidden></div>
    <footer class="detail-footer">© Peter Hoff Design AB</footer>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lbClose">&#10005;</button>
    <button class="lb-prev"  id="lbPrev">&#8592;</button>
    <button class="lb-next"  id="lbNext">&#8594;</button>
    <img class="lb-img" id="lbImg" src="" alt="" />
    <div class="lb-caption" id="lbCaption"></div>
  </div>

  <footer class="site-footer" id="siteFooter"></footer>

  <script src="app.js"></script>
</body>
</html>
