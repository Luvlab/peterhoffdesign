<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS — Peter Hoff Design</title>
  <link rel="stylesheet" href="admin.css" />
  <script>
    // Auth guard — runs before anything renders.
    // Loads Supabase, checks session, redirects if none.
    (function() {
      fetch('/api/config')
        .then(r => r.json())
        .then(function(cfg) {
          var s = document.createElement('script')
          s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js'
          s.onload = function() {
            window._sb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey)
            // Handle magic-link callback (token in URL hash or query)
            window._sb.auth.onAuthStateChange(function(event, session) {
              if (event === 'SIGNED_IN' && session) {
                // Store token for API calls, clear URL hash
                localStorage.setItem('phd_sb_token', session.access_token)
                history.replaceState(null, '', '/admin')
              }
              if (event === 'SIGNED_OUT') {
                localStorage.removeItem('phd_sb_token')
                location.replace('/admin-login')
              }
            })
            window._sb.auth.getSession().then(function(res) {
              var session = res.data && res.data.session
              if (!session) {
                location.replace('/admin-login')
              } else {
                localStorage.setItem('phd_sb_token', session.access_token)
                // Reveal body now that auth is confirmed
                document.body.style.visibility = 'visible'
              }
            })
          }
          document.head.appendChild(s)
        })
        .catch(function() { location.replace('/admin-login') })
    })()
  </script>
</head>
<body style="visibility:hidden">

  <header class="adm-header">
    <div class="adm-header-left">
      <img src="phd-logo.png" alt="" class="adm-logo" />
      <div>
        <h1 class="adm-title">CMS</h1>
        <p class="adm-sub">Peter Hoff Design AB</p>
      </div>
    </div>
    <div class="adm-header-right">
      <span class="adm-stats" id="admStats"></span>
      <a href="/" class="adm-btn adm-btn--outline" target="_blank">View Site ↗</a>
      <button class="adm-btn adm-btn--outline" id="logoutBtn" title="Sign out">Sign out</button>
    </div>
  </header>

  <div class="adm-toolbar">
    <div class="adm-cats" id="admCats">
      <button class="cat-tab active" data-cat="all">All</button>
    </div>
    <button class="adm-btn adm-btn--primary" id="addBtn"><span class="add-label-long">+ Add Project</span><span class="add-label-short">+</span></button>
  </div>

  <main class="adm-main">
    <table class="adm-table" id="admTable">
      <thead>
        <tr>
          <th class="col-drag"></th>
          <th class="col-vis">Visible</th>
          <th class="col-name">Project</th>
          <th class="col-cat">Category</th>
          <th class="col-imgs">Images</th>
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="admBody"></tbody>
    </table>
    <p class="adm-empty" id="admEmpty" hidden>No projects yet.</p>
  </main>

  <!-- Edit / Add Modal -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal modal--wide">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add Project</h2>
        <button class="modal-close" id="modalClose">&#10005;</button>
      </div>

      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="details">Details</button>
        <button class="modal-tab" data-tab="images">Images <span class="tab-count" id="tabImgCount"></span></button>
      </div>

      <div class="modal-body">
        <!-- Details tab -->
        <div class="tab-panel" id="tabDetails">
          <input type="hidden" id="editId" />
          <div class="field">
            <label>Name <span class="req">*</span></label>
            <input type="text" id="fName" placeholder="Project name" />
          </div>
          <div class="field">
            <label>Category <span class="req">*</span></label>
            <select id="fCat"></select>
          </div>
          <div class="field">
            <label>Slug <small>(auto-generated if blank)</small></label>
            <input type="text" id="fSlug" placeholder="my-project" />
          </div>
          <div class="field">
            <label>Description</label>
            <textarea id="fDesc" rows="3" placeholder="Optional description"></textarea>
          </div>
          <div class="field field--inline">
            <label>Visible on site</label>
            <label class="toggle">
              <input type="checkbox" id="fVisible" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <!-- Images tab -->
        <div class="tab-panel" id="tabImages" hidden>
          <div class="img-manager">
            <!-- Upload area -->
            <div class="img-upload-zone" id="uploadZone">
              <input type="file" id="imgFileInput" multiple accept="image/*,video/mp4,image/gif" hidden />
              <label for="imgFileInput" class="upload-label">
                <span class="upload-icon">↑</span>
                <span class="upload-text">Click to upload media</span>
                <span class="upload-hint">or drag &amp; drop · JPG, PNG, WebP, GIF, MP4</span>
              </label>
            </div>

            <!-- Upload progress -->
            <div class="upload-progress" id="uploadProgress" hidden>
              <div class="upload-bar-wrap"><div class="upload-bar" id="uploadBar"></div></div>
              <p class="upload-status" id="uploadStatus">Uploading…</p>
            </div>

            <!-- Image grid -->
            <div class="img-grid" id="imgGrid"></div>
            <p class="img-empty" id="imgEmpty" hidden>No images yet. Upload some above.</p>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="adm-btn adm-btn--outline" id="modalCancel">Cancel</button>
        <button class="adm-btn adm-btn--primary" id="modalSave">Save Details</button>
      </div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div class="modal-overlay" id="confirmOverlay" hidden>
    <div class="modal modal--sm">
      <div class="modal-header">
        <h2 class="modal-title" id="confirmTitle">Confirm</h2>
      </div>
      <div class="modal-body">
        <p id="confirmMsg"></p>
      </div>
      <div class="modal-footer">
        <button class="adm-btn adm-btn--outline" id="confirmNo">Cancel</button>
        <button class="adm-btn adm-btn--danger"  id="confirmYes">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
